<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Tareas — Mis tareas</title>
    <link rel="stylesheet" href="css/estilos.css">
</head>
<body>

    <nav>
        <a href="tareas.html" class="logo">Gestor de Tareas</a>
        <a href="tareas.html" class="activo">Tareas</a>
        <a href="categorias.html">Categorías</a>
        <a href="etiquetas.html">Etiquetas</a>
        <a href="admin.html" id="link-admin" style="display:none">Admin</a>
        <span id="nav-usuario"></span>
        <button class="btn-tema" id="btn-tema">Tema</button>
        <button id="btn-logout">Cerrar sesión</button>
    </nav>

    <main>
        <h1 class="page-title">Mis tareas</h1>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-numero" id="dash-total">—</div>
                <div class="stat-label">Total</div>
            </div>
            <div class="stat-card stat-completadas">
                <div class="stat-numero" id="dash-completadas">—</div>
                <div class="stat-label">Completadas</div>
            </div>
            <div class="stat-card stat-pendientes">
                <div class="stat-numero" id="dash-pendientes">—</div>
                <div class="stat-label">Pendientes</div>
            </div>
            <div class="stat-card stat-alta">
                <div class="stat-numero" id="dash-alta">—</div>
                <div class="stat-label">Alta prioridad</div>
            </div>
        </div>

        <div class="card">
            <h2 id="titulo-formulario">Nueva tarea</h2>
            <form id="form-tarea">
                <div class="form-grid">
                    <div class="full">
                        <label for="input-titulo">Título *</label>
                        <input type="text" id="input-titulo" placeholder="Título de la tarea" required>
                    </div>
                    <div class="full">
                        <label for="input-descripcion">Descripción</label>
                        <input type="text" id="input-descripcion" placeholder="Descripción opcional">
                    </div>
                    <div>
                        <label for="input-fecha">Fecha límite *</label>
                        <input type="datetime-local" id="input-fecha" required>
                    </div>
                    <div>
                        <label for="input-prioridad">Prioridad</label>
                        <select id="input-prioridad">
                            <option value="">Sin prioridad</option>
                            <option value="ALTA">Alta</option>
                            <option value="MEDIA">Media</option>
                            <option value="BAJA">Baja</option>
                        </select>
                    </div>
                    <div class="full">
                        <label for="input-categoria">Categoría</label>
                        <select id="input-categoria">
                            <option value="">Sin categoría</option>
                        </select>
                    </div>
                    <div class="full" id="grupo-tags-form">
                        <label for="input-tags">Etiquetas <span class="muted">(opcional · Ctrl+clic para varias)</span></label>
                        <select id="input-tags" multiple size="3" style="height:auto;"></select>
                    </div>
                </div>
                <p class="error-form" id="error-form"></p>
                <div class="btn-row">
                    <button type="submit" class="btn btn-primary" id="btn-guardar">Crear tarea</button>
                    <button type="button" class="btn btn-secondary oculto" id="btn-cancelar">Cancelar</button>
                </div>
            </form>
        </div>

        <div class="card">
            <div style="display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:.5rem; margin-bottom:1rem;">
                <h2 style="margin-bottom:0">Lista de tareas</h2>
                <button class="btn btn-secondary" id="btn-cargar">Recargar</button>
            </div>

            <div class="filtros-bar">
                <input type="text" id="filtro-busqueda" placeholder="Buscar por título o descripción...">
                <select id="filtro-estado">
                    <option value="">Todos los estados</option>
                    <option value="pendiente">Pendientes</option>
                    <option value="completada">Completadas</option>
                </select>
                <select id="filtro-prioridad">
                    <option value="">Todas las prioridades</option>
                    <option value="ALTA">Alta</option>
                    <option value="MEDIA">Media</option>
                    <option value="BAJA">Baja</option>
                </select>
                <select id="ordenar-por">
                    <option value="reciente">Más recientes</option>
                    <option value="deadline">Por fecha límite</option>
                    <option value="prioridad">Por prioridad</option>
                    <option value="titulo">Por título (A-Z)</option>
                </select>
                <span class="contador-info">
                    Mostrando <strong id="contador-filtradas">0</strong> de <strong id="contador-tareas">0</strong>
                </span>
            </div>

            <div class="leyenda-dl">
                <span class="l-vencida">Vencida</span>
                <span class="l-proxima">Vence pronto (&lt;3 días)</span>
                <span class="l-ok">A tiempo</span>
            </div>

            <div class="tabla-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>Título</th>
                            <th>Descripción</th>
                            <th>Prioridad</th>
                            <th>Fecha límite</th>
                            <th>Categoría</th>
                            <th>Etiquetas</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="lista-tareas">
                        <tr><td colspan="7" class="cargando">Cargando tareas...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <div class="toast" id="toast"></div>

    <script src="js/config.js"></script>
    <script src="js/tareas.js"></script>
    <script>
        const btnTema = document.getElementById("btn-tema");
        const savedTheme = localStorage.getItem("theme") || "light";
        if (savedTheme === "dark") document.documentElement.setAttribute("data-theme", "dark");
        btnTema.addEventListener("click", () => {
            const isDark = document.documentElement.getAttribute("data-theme") === "dark";
            document.documentElement.setAttribute("data-theme", isDark ? "light" : "dark");
            localStorage.setItem("theme", isDark ? "light" : "dark");
        });
    </script>
</body>
</html>
